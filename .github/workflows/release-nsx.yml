name: Build and Release NSX Skin

on:
  push:
    tags:
      - 'nsx-v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version from tag
        id: version
        # nsx-v0.2.9 -> v0.2.9
        run: echo "VERSION=${GITHUB_REF_NAME#nsx-}" >> $GITHUB_OUTPUT

      - name: Assemble self-contained skin
        # packages/nsx/src is the servable skin root (index.html + manifest.json +
        # css/ modules/ ui/). Sync the shared core into core/ exactly as dev does,
        # then inject version/repository into the manifest.
        run: |
          cp -r packages/nsx/src staging
          mkdir -p staging/core
          cp packages/core/src/*.js staging/core/
          jq '.version = "${{ steps.version.outputs.VERSION }}" | .repository = "${{ github.repository }}"' staging/manifest.json > staging/manifest.tmp.json
          mv staging/manifest.tmp.json staging/manifest.json

      - name: Create release archive
        run: |
          cd staging
          zip -r ../NSX-${{ steps.version.outputs.VERSION }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: NSX-${{ steps.version.outputs.VERSION }}.zip
          name: NSX ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
